name: Deploy Cloud (chat proxy + pricing sync)

# Deploys the Google Cloud server code in cloud/ to Cloud Run.
# Separate from deploy.yml (the static-site mirror). Only runs when cloud/ changes,
# so site-only commits never rebuild containers.
#
# Auth uses Workload Identity Federation (OIDC) — no service-account keys.
# Configure these GitHub repo VARIABLES (Settings → Secrets and variables → Actions → Variables):
#   GCP_PROJECT_ID, GCP_REGION, GCP_WIF_PROVIDER, GCP_DEPLOYER_SA,
#   CHAT_PROXY_SA, PRICING_SYNC_SA, ALLOWED_ORIGINS, GEMINI_MODEL (optional),
#   MASTER_SHEET_ID, MASTER_SHEET_RANGE, GITHUB_TOKEN_SECRET
# See cloud/infra/README.md for how to create each one.

on:
  push:
    branches: [main]
    paths:
      - 'cloud/**'
      - '.github/workflows/deploy-cloud.yml'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOYER_SA }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy chat proxy (Cloud Run service)
        run: |
          gcloud run deploy nuera-chat-proxy \
            --source cloud/chat-proxy \
            --project "$PROJECT_ID" --region "$REGION" \
            --service-account "${{ vars.CHAT_PROXY_SA }}" \
            --allow-unauthenticated \
            --max-instances 3 --concurrency 20 --memory 512Mi \
            --set-env-vars "VERTEX_LOCATION=${REGION},GEMINI_MODEL=${{ vars.GEMINI_MODEL || 'gemini-2.5-flash' }},ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }}"

      - name: Deploy pricing sync (Cloud Run job)
        run: |
          gcloud run jobs deploy nuera-pricing-sync \
            --source cloud/pricing-sync \
            --project "$PROJECT_ID" --region "$REGION" \
            --service-account "${{ vars.PRICING_SYNC_SA }}" \
            --set-env-vars "MASTER_SHEET_ID=${{ vars.MASTER_SHEET_ID }},MASTER_SHEET_RANGE=${{ vars.MASTER_SHEET_RANGE }},GITHUB_TOKEN_SECRET=${{ vars.GITHUB_TOKEN_SECRET }},GITHUB_OWNER=${{ github.repository_owner }},GITHUB_REPO=nuera-tech-site"
