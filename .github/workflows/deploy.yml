name: Deploy to nuera.talha-k.com

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to OpenResty
        run: |
          cp index.html /opt/1panel/www/sites/nuera/index/index.html
          docker exec 1Panel-openresty-IATx nginx -s reload
          echo "Deployed at $(date)"
