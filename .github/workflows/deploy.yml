name: Deploy to nuera.talha-k.com

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to OpenResty
        run: |
          DEST=/opt/1panel/www/sites/nuera/index
          mkdir -p "$DEST/assets"
          # Root files
          cp index.html pricing-data.json manifest.webmanifest robots.txt sitemap.xml sw.js "$DEST/"
          # Hashed/static assets (fonts, js, icons)
          cp -r assets/. "$DEST/assets/"
          docker exec 1Panel-openresty-IATx nginx -s reload
          echo "Deployed at $(date)"
