<svg width="1280" height="640" viewBox="0 0 1280 640" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Icon N stroke gradient -->
    <linearGradient id="nStroke" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#c4b5fd"/>
      <stop offset="0.45" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <!-- Icon panel background -->
    <radialGradient id="iconBg" cx="0.5" cy="0.36" r="0.85">
      <stop stop-color="#16131f"/>
      <stop offset="1" stop-color="#07070c"/>
    </radialGradient>
    <!-- Top / bottom accent border -->
    <linearGradient id="borderGrad" x1="0" y1="0" x2="1280" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#8b5cf6" stop-opacity="0"/>
      <stop offset="0.3" stop-color="#8b5cf6"/>
      <stop offset="0.7" stop-color="#22d3ee"/>
      <stop offset="1"   stop-color="#22d3ee" stop-opacity="0"/>
    </linearGradient>
    <!-- Vertical separator fade -->
    <linearGradient id="sepGrad" x1="0" y1="0" x2="0" y2="640" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="white" stop-opacity="0"/>
      <stop offset="0.2" stop-color="white" stop-opacity="0.09"/>
      <stop offset="0.8" stop-color="white" stop-opacity="0.09"/>
      <stop offset="1"   stop-color="white" stop-opacity="0"/>
    </linearGradient>
    <!-- Aurora blur -->
    <filter id="aurora">
      <feGaussianBlur stdDeviation="75"/>
    </filter>
    <!-- N mark glow -->
    <filter id="nGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- ── Background ─────────────────────────────── -->
  <rect width="1280" height="640" fill="#07070c"/>

  <!-- Aurora glows -->
  <ellipse cx="1080" cy="70"  rx="380" ry="290" fill="#7c3aed" opacity="0.18" filter="url(#aurora)"/>
  <ellipse cx="180"  cy="590" rx="300" ry="210" fill="#0e7490" opacity="0.14" filter="url(#aurora)"/>

  <!-- Outer border -->
  <rect x="0.5" y="0.5" width="1279" height="639" fill="none" stroke="white" stroke-opacity="0.07" stroke-width="1"/>

  <!-- Top accent line -->
  <rect x="0" y="0" width="1280" height="2" fill="url(#borderGrad)"/>

  <!-- ── Left panel: N icon mark ─────────────────── -->
  <!-- Scaled to 200×200, centered at (190, 320) -->
  <!-- scale = 200/512 = 0.390625; translate = (190-100, 320-100) -->
  <g transform="translate(90, 220) scale(0.390625)">
    <rect width="512" height="512" rx="116" fill="url(#iconBg)"/>
    <rect x="6" y="6" width="500" height="500" rx="112" fill="none" stroke="white" stroke-opacity="0.07" stroke-width="2"/>
    <g filter="url(#nGlow)" stroke="url(#nStroke)" stroke-width="56"
       stroke-linecap="round" stroke-linejoin="round" fill="none">
      <path d="M170 356 L170 158"/>
      <path d="M170 158 L342 356"/>
      <path d="M342 356 L342 158"/>
    </g>
    <circle cx="342" cy="158" r="15" fill="#22d3ee"/>
  </g>

  <!-- Vertical separator -->
  <rect x="380" y="0" width="1" height="640" fill="url(#sepGrad)"/>

  <!-- ── Right panel: text ───────────────────────── -->

  <!-- Site name -->
  <text x="440" y="234"
        font-family="Noto Sans, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="72" font-weight="700" letter-spacing="-1"
        fill="#f4f6ff">Nuera Tech</text>

  <!-- Subtitle -->
  <text x="442" y="288"
        font-family="Noto Sans, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="28" font-weight="500" letter-spacing="0.4"
        fill="#a78bfa">Guelph Phone Repair</text>

  <!-- Thin rule -->
  <rect x="442" y="308" width="600" height="1" fill="white" opacity="0.09"/>

  <!-- Description -->
  <text x="442" y="354"
        font-family="Noto Sans, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="19" font-weight="400"
        fill="#9fa9bd">iPhone · Samsung · Pixel · iPad — same-day service, Guelph ON.</text>
  <text x="442" y="385"
        font-family="Noto Sans, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="19" font-weight="400"
        fill="#73809a">Up to $115 cheaper than Mobile Klinik · 90-day warranty · book on WhatsApp.</text>

  <!-- ── Feature badges ──────────────────────────── -->
  <!-- Same-day service -->
  <rect x="442" y="428" width="163" height="36" rx="18"
        fill="#8b5cf6" fill-opacity="0.14"
        stroke="#8b5cf6" stroke-opacity="0.40" stroke-width="1"/>
  <text x="524" y="451"
        font-family="Noto Sans, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="13" font-weight="600" fill="#c4b5fd" text-anchor="middle">Same-day service</text>

  <!-- 90-day warranty -->
  <rect x="617" y="428" width="158" height="36" rx="18"
        fill="#22d3ee" fill-opacity="0.09"
        stroke="#22d3ee" stroke-opacity="0.30" stroke-width="1"/>
  <text x="696" y="451"
        font-family="Noto Sans, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="13" font-weight="600" fill="#67e8f9" text-anchor="middle">90-day warranty</text>

  <!-- WhatsApp booking -->
  <rect x="787" y="428" width="170" height="36" rx="18"
        fill="#34d399" fill-opacity="0.09"
        stroke="#34d399" stroke-opacity="0.28" stroke-width="1"/>
  <text x="872" y="451"
        font-family="Noto Sans, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="13" font-weight="600" fill="#6ee7b7" text-anchor="middle">WhatsApp booking</text>

  <!-- Guelph, ON -->
  <rect x="969" y="428" width="118" height="36" rx="18"
        fill="#fbbf24" fill-opacity="0.09"
        stroke="#fbbf24" stroke-opacity="0.28" stroke-width="1"/>
  <text x="1028" y="451"
        font-family="Noto Sans, Liberation Sans, DejaVu Sans, sans-serif"
        font-size="13" font-weight="600" fill="#fcd34d" text-anchor="middle">Guelph, ON</text>

  <!-- Bottom accent line -->
  <rect x="0" y="638" width="1280" height="2" fill="url(#borderGrad)" opacity="0.45"/>
</svg>
