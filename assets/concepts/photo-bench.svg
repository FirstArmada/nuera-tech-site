<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" role="img" aria-label="Concept render: warm repair bench scene with a phone mid-repair and precision tools">
  <defs>
    <radialGradient id="b-bg" cx="50%" cy="22%" r="85%">
      <stop offset="0" stop-color="#1b1726"/>
      <stop offset=".6" stop-color="#0c0c14"/>
      <stop offset="1" stop-color="#060509"/>
    </radialGradient>
    <linearGradient id="b-bench" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1622"/>
      <stop offset="1" stop-color="#0a0910"/>
    </linearGradient>
    <linearGradient id="b-neon" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="b-spark" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fbbf24"/>
      <stop offset=".4" stop-color="#fbbf24" stop-opacity=".5"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <filter id="b-glow" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="26"/>
    </filter>
    <filter id="b-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>
  <rect width="1000" height="800" fill="url(#b-bg)"/>
  <ellipse cx="500" cy="120" rx="380" ry="120" fill="url(#b-neon)" opacity=".16" filter="url(#b-glow)"/>
  <ellipse cx="500" cy="150" rx="260" ry="70" fill="#fbbf24" opacity=".07" filter="url(#b-glow)"/>
  <rect x="0" y="520" width="1000" height="280" fill="url(#b-bench)"/>
  <rect x="0" y="516" width="1000" height="5" fill="url(#b-neon)" opacity=".4"/>
  <ellipse cx="470" cy="560" rx="190" ry="40" fill="#000" opacity=".5" filter="url(#b-soft)"/>
  <g transform="rotate(-6 460 520)">
    <rect x="320" y="430" width="280" height="160" rx="20" fill="#0c0c16" stroke="#2a2740" stroke-width="2"/>
    <rect x="338" y="448" width="244" height="124" rx="12" fill="#11131f"/>
    <rect x="352" y="460" width="100" height="100" rx="8" fill="#161a2c"/>
    <rect x="466" y="460" width="100" height="46" rx="6" fill="#161a2c"/>
    <rect x="466" y="514" width="100" height="46" rx="6" fill="#161a2c"/>
    <circle cx="402" cy="510" r="60" fill="url(#b-spark)"/>
    <circle cx="402" cy="510" r="6" fill="#fff" opacity=".85"/>
  </g>
  <g stroke="#9fa9bd" stroke-linecap="round" fill="none">
    <line x1="690" y1="430" x2="760" y2="610" stroke-width="9" opacity=".8"/>
    <rect x="744" y="600" width="34" height="46" rx="6" transform="rotate(20 760 620)" fill="#8b5cf6" stroke="none" opacity=".85"/>
    <path d="M250 600 L210 470 M260 600 L300 470" stroke-width="6" opacity=".7"/>
    <circle cx="255" cy="606" r="5" stroke="none" fill="#22d3ee" opacity=".8"/>
  </g>
  <text x="60" y="730" font-family="Inter,Helvetica,Arial,sans-serif" font-size="20" letter-spacing="5" fill="#9fa9bd" opacity=".4">NUERA BENCH</text>
</svg>
