<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 800" role="img" aria-label="Concept render: illuminated Nuera Tech storefront sign at dusk">
  <defs>
    <linearGradient id="s-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171428"/>
      <stop offset=".5" stop-color="#0c0c16"/>
      <stop offset="1" stop-color="#060509"/>
    </linearGradient>
    <linearGradient id="s-facade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#13121c"/>
      <stop offset="1" stop-color="#0a090f"/>
    </linearGradient>
    <linearGradient id="s-win" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c2436"/>
      <stop offset="1" stop-color="#0c1018"/>
    </linearGradient>
    <radialGradient id="s-warm" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#fbbf24" stop-opacity=".22"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="s-n" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#c4b5fd"/>
      <stop offset=".5" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <filter id="s-neon" x="-70%" y="-70%" width="240%" height="240%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="s-aura" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>
  <rect width="1000" height="800" fill="url(#s-bg)"/>
  <rect x="70" y="120" width="860" height="600" rx="14" fill="url(#s-facade)" stroke="#23222e" stroke-width="2"/>
  <!-- neon aura behind sign -->
  <ellipse cx="500" cy="250" rx="340" ry="120" fill="#8b5cf6" opacity=".3" filter="url(#s-aura)"/>
  <!-- lit window -->
  <rect x="150" y="430" width="700" height="250" rx="8" fill="url(#s-win)" stroke="#2a3346" stroke-width="2"/>
  <ellipse cx="500" cy="560" rx="300" ry="130" fill="url(#s-warm)"/>
  <g opacity=".5">
    <rect x="220" y="520" width="120" height="120" rx="6" fill="#222b3e"/>
    <rect x="440" y="500" width="120" height="140" rx="6" fill="#26304a"/>
    <rect x="660" y="525" width="120" height="115" rx="6" fill="#222b3e"/>
  </g>
  <line x1="150" y1="430" x2="850" y2="430" stroke="#22d3ee" stroke-opacity=".25" stroke-width="3"/>
  <!-- glowing sign: N mark + wordmark -->
  <g filter="url(#s-neon)">
    <g transform="translate(258 196)">
      <rect width="80" height="80" rx="20" fill="#0f0d18"/>
      <g transform="translate(20 20)">
        <path d="M12 28V12L28 28V12" fill="none" stroke="url(#s-n)" stroke-width="4.8" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="28" cy="12" r="2.4" fill="#22d3ee"/>
      </g>
    </g>
    <text x="356" y="258" font-family="Inter,Helvetica,Arial,sans-serif" font-size="62" font-weight="800" fill="#f4f6ff">Nuera<tspan fill="#22d3ee">Tech</tspan></text>
  </g>
  <text x="500" y="358" text-anchor="middle" font-family="Inter,Helvetica,Arial,sans-serif" font-size="22" font-weight="600" letter-spacing="8" fill="#9fa9bd">PHONE REPAIR · GUELPH</text>
</svg>
